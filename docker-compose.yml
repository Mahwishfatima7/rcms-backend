version: "3.8"

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: rcms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rcms_db
      MYSQL_USER: rcms_user
      MYSQL_PASSWORD: rcms_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - rcms-network

  # RCMS Backend API
  backend:
    build: .
    container_name: rcms-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: rcms_user
      DB_PASSWORD: rcms_password
      DB_NAME: rcms_db
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    networks:
      - rcms-network
    restart: unless-stopped

networks:
  rcms-network:
    driver: bridge

volumes:
  mysql_data:
